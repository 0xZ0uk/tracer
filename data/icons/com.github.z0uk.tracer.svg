<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3584e4"/>
      <stop offset="100%" stop-color="#1a5fb4"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>
  <!-- PNG icon (grid + dot pattern indicating bitmap) -->
  <g transform="translate(14, 14)">
    <rect x="0" y="0" width="46" height="46" rx="4" fill="white" opacity="0.2"/>
    <rect x="0" y="0" width="46" height="46" rx="4" fill="none" stroke="white" stroke-width="1.5"/>
    <!-- grid dots -->
    <circle cx="8" cy="8" r="2" fill="white" opacity="0.8"/>
    <circle cx="23" cy="8" r="2" fill="white" opacity="0.8"/>
    <circle cx="38" cy="8" r="2" fill="white" opacity="0.8"/>
    <circle cx="8" cy="23" r="2" fill="white" opacity="0.8"/>
    <circle cx="23" cy="23" r="2" fill="white" opacity="0.8"/>
    <circle cx="38" cy="23" r="2" fill="white" opacity="0.8"/>
    <circle cx="8" cy="38" r="2" fill="white" opacity="0.8"/>
    <circle cx="23" cy="38" r="2" fill="white" opacity="0.8"/>
    <circle cx="38" cy="38" r="2" fill="white" opacity="0.8"/>
    <!-- arrow -->
    <path d="M 52 23 L 62 23 L 58 19 M 62 23 L 58 27" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- SVG icon (curves indicating vector) -->
  <g transform="translate(66, 66)">
    <rect x="0" y="0" width="48" height="48" rx="4" fill="white" opacity="0.2"/>
    <rect x="0" y="0" width="48" height="48" rx="4" fill="none" stroke="white" stroke-width="1.5"/>
    <!-- bezier curve -->
    <path d="M 6 36 C 6 12, 24 12, 24 24 C 24 36, 42 36, 42 18" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <!-- anchor points -->
    <circle cx="6" cy="36" r="2.5" fill="#99c1f1" stroke="white" stroke-width="1"/>
    <circle cx="24" cy="24" r="2.5" fill="#99c1f1" stroke="white" stroke-width="1"/>
    <circle cx="42" cy="18" r="2.5" fill="#99c1f1" stroke="white" stroke-width="1"/>
  </g>
</svg>
